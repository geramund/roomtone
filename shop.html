<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop — Room Tone</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <button class="hamburger" aria-label="Toggle navigation">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <div class="page-wrapper">

    <aside class="sidebar">
      <a href="index.html" class="sidebar-logo">
        <img src="Logo/Logo.png" alt="Room Tone" class="sidebar-logo-img logo-img">
      </a>
      <nav class="sidebar-nav">
        <a href="shop.html" class="sidebar-nav-main active">SHOP</a>
        <ul class="category-filters">
          <li><a href="shop.html?cat=all"      class="cat-filter" data-cat="all">all</a></li>
          <li><a href="shop.html?cat=tables"   class="cat-filter" data-cat="tables">tables</a></li>
          <li><a href="shop.html?cat=seating"  class="cat-filter" data-cat="seating">seating</a></li>
          <li><a href="shop.html?cat=lighting" class="cat-filter" data-cat="lighting">lighting</a></li>
          <li><a href="shop.html?cat=storage"  class="cat-filter" data-cat="storage">storage</a></li>
          <li><a href="shop.html?cat=textiles" class="cat-filter" data-cat="textiles">textiles</a></li>
          <li><a href="shop.html?cat=art"      class="cat-filter" data-cat="art">art + mirrors</a></li>
          <li><a href="shop.html?cat=objects"  class="cat-filter" data-cat="objects">objects</a></li>
        </ul>
        <a href="contact.html" class="sidebar-nav-main">CONTACT</a>
        <a href="about.html"   class="sidebar-nav-main">ABOUT</a>
      </nav>
    </aside>

    <main class="main-content">
      <section class="product-grid" id="product-grid"></section>
    </main>

  </div>

  <script src="js/sheets.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var cat = params.get('cat') || 'all';

      /* Highlight active category filter link */
      document.querySelectorAll('.cat-filter').forEach(function (link) {
        link.classList.toggle('active', (link.dataset.cat || 'all') === cat);
      });

      var grid = document.getElementById('product-grid');
      grid.innerHTML = '<p style="font-style:italic;font-family:inherit;font-size:0.82rem;opacity:0.6;padding:0.25rem 0">loading\u2026</p>';

      RoomToneSheets.fetchProducts()
        .then(function (products) {
          var filtered = (cat === 'all')
            ? products
            : products.filter(function (p) { return p.type === cat; });

          if (filtered.length === 0) {
            grid.innerHTML = '<p style="font-family:inherit;font-size:0.82rem;opacity:0.6">no items found.</p>';
            return;
          }

          grid.innerHTML = '';
          filtered.forEach(function (product) {
            var a = document.createElement('a');
            a.href = 'product.html?item=' + encodeURIComponent(product.slug);
            a.className = 'product-card';
            a.dataset.category = product.type;

            var img = document.createElement('img');
            img.alt = product.name;
            img.className = 'product-img';
            RoomToneSheets.tryImage(img, product.thumbnail);

            var info = document.createElement('p');
            info.className = 'product-info';
            info.innerHTML = product.name.toLowerCase() + ' &nbsp; $' + Number(product.price).toLocaleString();

            a.appendChild(img);
            a.appendChild(info);
            grid.appendChild(a);
          });
        })
        .catch(function () {
          grid.innerHTML = '<p style="font-family:inherit;font-size:0.82rem;opacity:0.6">could not load products. please try again.</p>';
        });
    })();
  </script>
  <script src="js/nav.js"></script>

</body>
</html>
