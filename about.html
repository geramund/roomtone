<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About — Room Tone</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <button class="hamburger" aria-label="Toggle navigation">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <div class="page-wrapper">

    <aside class="sidebar">
      <a href="index.html" class="sidebar-logo">
        <img src="Logo/Logo.png" alt="Room Tone" class="sidebar-logo-img logo-img">
      </a>
      <nav class="sidebar-nav">
        <a href="shop.html" class="sidebar-nav-main">SHOP</a>
        <ul class="category-filters">
          <li><a href="shop.html?cat=all"      class="cat-filter" data-cat="all">all</a></li>
          <li><a href="shop.html?cat=tables"   class="cat-filter" data-cat="tables">tables</a></li>
          <li><a href="shop.html?cat=seating"  class="cat-filter" data-cat="seating">seating</a></li>
          <li><a href="shop.html?cat=lighting" class="cat-filter" data-cat="lighting">lighting</a></li>
          <li><a href="shop.html?cat=storage"  class="cat-filter" data-cat="storage">storage</a></li>
          <li><a href="shop.html?cat=textiles" class="cat-filter" data-cat="textiles">textiles</a></li>
          <li><a href="shop.html?cat=art"      class="cat-filter" data-cat="art">art + mirrors</a></li>
          <li><a href="shop.html?cat=objects"  class="cat-filter" data-cat="objects">objects</a></li>
        </ul>
        <a href="contact.html" class="sidebar-nav-main">CONTACT</a>
        <a href="about.html"   class="sidebar-nav-main active">ABOUT</a>
      </nav>
    </aside>

    <main class="main-content">
      <p class="about-text">
        Room Tone is a shop based in Troy, NY. We stock vintage furniture and home goods.
      </p>

      <form class="contact-form" id="contact-form">
        <div class="form-field">
          <label for="form-name">name</label>
          <input type="text" id="form-name" name="name" required>
        </div>
        <div class="form-field">
          <label for="form-email">email</label>
          <input type="email" id="form-email" name="email" required>
        </div>
        <div class="form-field">
          <label for="form-msg">message</label>
          <textarea id="form-msg" name="message" rows="5" required></textarea>
        </div>
        <div class="form-footer">
          <button type="submit" class="form-submit">send</button>
          <span class="form-confirm" id="form-confirm" aria-live="polite"></span>
        </div>
      </form>

      <script>
        document.getElementById('contact-form').addEventListener('submit', function (e) {
          e.preventDefault();
          var name    = document.getElementById('form-name').value;
          var email   = document.getElementById('form-email').value;
          var message = document.getElementById('form-msg').value;
          var body    = 'name: ' + name + '\nemail: ' + email + '\n\n' + message;
          window.location.href =
            'mailto:room.tone.shop@gmail.com' +
            '?subject=' + encodeURIComponent('Room Tone Inquiry') +
            '&body='    + encodeURIComponent(body);
          this.reset();
          document.getElementById('form-confirm').textContent = 'email client opened.';
        });
      </script>
    </main>

  </div>

  <script src="js/nav.js"></script>

</body>
</html>
